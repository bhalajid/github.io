<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji Durai — Senior EUC &amp; Azure Platform Engineer</title>
<meta name="description" content="Balaji Durai — Senior EUC & Azure Platform Engineer. 16+ Jahre Enterprise-Erfahrung: Citrix DaaS, Azure, AVD, AI Platform, NetScaler, IaC.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090c; --card:rgba(255,255,255,.035); --border:rgba(255,255,255,.09);
  --text:#f2f4f8; --muted:#939aa8; --blue:#2f7bff; --sky:#7db4ff; --amber:#4d9fff; --amber2:#2f7bff;
  --grad:linear-gradient(120deg,#ffffff,#9cc4ff 45%,#2f7bff);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden;cursor:default}
h1,h2,h3,.stat b,.bento b{font-family:'Sora',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
::selection{background:rgba(47,123,255,.4)}

/* particle canvas + spotlight */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
#spot{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(600px at 50% 30%,rgba(59,130,246,.10),transparent 70%)}

/* scroll progress */
#prog{position:fixed;top:0;left:0;height:3px;width:0;background:var(--grad);z-index:99;box-shadow:0 0 12px rgba(77,159,255,.6)}

.wrap{max-width:1100px;margin:0 auto;padding:0 28px;position:relative;z-index:2}

/* nav */
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:rgba(4,7,15,.7);border-bottom:1px solid var(--border)}
.navin{max-width:1100px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-family:'Sora';font-weight:800;font-size:1.1rem}
.logo span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.navlinks{display:flex;gap:6px;font-size:.88rem}
.navlinks a{color:var(--muted);text-decoration:none;padding:7px 14px;border-radius:999px;transition:.2s}
.navlinks a:hover{color:var(--text)}
.navlinks a.active{color:#fff;background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35)}
.langbtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:999px;padding:7px 16px;cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s}
.langbtn:hover{border-color:var(--amber);box-shadow:0 0 18px rgba(77,159,255,.35)}
@media(max-width:760px){.navlinks{display:none}}

/* hero */
.hero{min-height:92vh;display:flex;flex-direction:column;justify-content:center;padding:80px 0 40px}
.herogrid{display:grid;grid-template-columns:1.2fr .8fr;gap:48px;align-items:center}
.pwrap{display:flex;justify-content:center}
.pring{position:relative;width:320px;height:320px;border-radius:50%;padding:6px;
  background:linear-gradient(135deg,#ffffff,#9cc4ff 40%,#2f7bff);
  box-shadow:0 0 70px rgba(47,123,255,.35),0 24px 60px rgba(0,0,0,.5);
  animation:float 6s ease-in-out infinite}
.pring img{width:100%;height:100%;object-fit:cover;object-position:center 18%;border-radius:50%;display:block;
  filter:grayscale(.25) contrast(1.1) brightness(.94) saturate(.85)}
.pring::after{content:"";position:absolute;inset:6px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle at 35% 28%,transparent 52%,rgba(4,10,25,.55)),
             linear-gradient(160deg,rgba(47,123,255,.20),rgba(8,9,12,.30))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@media(max-width:860px){.herogrid{grid-template-columns:1fr;gap:34px}.pwrap{order:-1;justify-content:flex-start}.pring{width:200px;height:200px}}
.avail{display:inline-flex;width:fit-content;align-items:center;gap:8px;background:rgba(77,159,255,.07);border:1px solid rgba(77,159,255,.35);color:var(--amber);border-radius:999px;padding:6px 16px;font-size:.8rem;font-weight:600;margin-bottom:28px}
.avail::before{content:"";width:8px;height:8px;border-radius:50%;background:#34d399;box-shadow:0 0 10px #34d399;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.hero .mono.small{color:var(--sky);font-size:.95rem;margin-bottom:10px}
.hero h1{font-size:clamp(2.6rem,7.5vw,5rem);font-weight:800;line-height:1.04;letter-spacing:-2px}
.hero h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.rolewrap{margin-top:18px;font-size:clamp(1.1rem,2.6vw,1.6rem);font-weight:600;color:var(--muted)}
#typed{color:#fff;border-right:2px solid var(--amber);padding-right:4px}
.hero p.lead{margin-top:24px;max-width:620px;color:var(--muted);font-size:1.05rem}
.cta{margin-top:36px;display:flex;gap:14px;flex-wrap:wrap}
.btn{border-radius:14px;padding:14px 28px;font-weight:600;font-size:.95rem;text-decoration:none;transition:.25s;display:inline-flex;align-items:center;gap:8px}
.btn.primary{background:var(--grad);color:#0a1220;box-shadow:0 8px 34px rgba(47,123,255,.35)}
.btn.primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 14px 44px rgba(47,123,255,.5)}
.btn.ghost{border:1px solid var(--border);color:var(--text);background:var(--card);backdrop-filter:blur(6px)}
.btn.ghost:hover{border-color:var(--sky);transform:translateY(-3px)}
.scrollhint{margin-top:60px;color:var(--muted);font-size:.8rem;display:flex;align-items:center;gap:10px;opacity:.7}
.scrollhint .m{width:22px;height:34px;border:2px solid var(--muted);border-radius:12px;position:relative}
.scrollhint .m::after{content:"";position:absolute;left:50%;top:6px;width:3px;height:7px;margin-left:-1.5px;border-radius:3px;background:var(--amber);animation:wheel 1.6s infinite}
@keyframes wheel{0%{transform:translateY(0);opacity:1}100%{transform:translateY(12px);opacity:0}}

/* marquee */
.marquee{border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;padding:22px 0;position:relative;background:rgba(255,255,255,.015)}
.mtrack{display:flex;gap:64px;width:max-content;animation:scroll 28s linear infinite}
.marquee:hover .mtrack{animation-play-state:paused}
.mtrack span{font-family:'Sora';font-weight:700;font-size:1.15rem;color:#b9c6de;opacity:.75;white-space:nowrap;transition:.2s}
.mtrack span:hover{opacity:1;color:var(--amber)}
.mtrack i{color:var(--amber);font-style:normal;opacity:.5}
@keyframes scroll{to{transform:translateX(-50%)}}

/* sections */
section{padding:90px 0 10px}
.kicker{color:var(--amber);font-family:'JetBrains Mono';font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:3px;margin-bottom:10px}
.sechead{display:flex;align-items:baseline;gap:16px;margin-bottom:36px}
.sechead h2{font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:800;letter-spacing:-1px}
.sechead::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* bento */
.bentogrid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(130px,auto);gap:16px}
.bento{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;position:relative;overflow:hidden;transition:.3s;display:flex;flex-direction:column;justify-content:flex-end;gap:3px}
.bento:hover{border-color:rgba(77,159,255,.5);transform:translateY(-4px);box-shadow:0 20px 50px rgba(0,0,0,.5)}
.bento .glowline{position:absolute;inset:0 0 auto 0;height:3px;background:var(--grad);opacity:0;transition:.3s}
.bento:hover .glowline{opacity:1}
.bento .ico{font-size:1.5rem;line-height:1;margin-bottom:auto;padding-bottom:14px}
.bento b{font-size:1rem;line-height:1.35;overflow-wrap:break-word}
.bento b.big{font-size:clamp(1.7rem,3.4vw,2.3rem);line-height:1.1;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bento span{color:var(--muted);font-size:.82rem;line-height:1.45}
.b1{grid-column:span 2;grid-row:span 2}
.b2{grid-column:span 1;grid-row:span 1}
.b3{grid-column:span 1;grid-row:span 2}
.b4{grid-column:span 1}
.b5{grid-column:span 2}
@media(max-width:820px){
  .bentogrid{grid-template-columns:repeat(2,1fr);grid-auto-rows:minmax(104px,auto)}
  .b1{grid-column:span 2;grid-row:span 1}
  .b3{grid-column:span 2;grid-row:span 1}
  .b5{grid-column:span 2}
  .bento .ico{padding-bottom:10px}
}
@media(max-width:560px){
  .wrap{padding:0 18px}
  section{padding:54px 0 8px}
  .bento{padding:18px}
  .bento b.big{font-size:1.7rem}
  .contactcard{padding:36px 20px}
  .hero{min-height:auto;padding:54px 0 28px}
  .mtrack{gap:38px}
  .hireme{padding:16px}
  .pbtn{padding:8px 16px;font-size:.84rem}
  .job{padding-left:26px}
}

/* skills */
.skillgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:18px;perspective:1200px}
.skillcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;transition:transform .15s ease,border-color .3s,box-shadow .3s;position:relative;overflow:hidden;transform-style:preserve-3d;will-change:transform}
.skillcard::after{content:"";position:absolute;inset:0;background:radial-gradient(420px at var(--mx,50%) var(--my,50%),rgba(59,130,246,.12),transparent 60%);opacity:0;transition:.3s;pointer-events:none}
.skillcard:hover::after{opacity:1}
.skillcard:hover{border-color:rgba(77,159,255,.45);box-shadow:0 18px 50px rgba(0,0,0,.5)}
.skillcard h3{font-size:1.05rem;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.skillcard .ico{font-size:1.35rem}
.skillcard .sub{color:var(--muted);font-size:.82rem;margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:.84rem;color:#cdd8ec;transition:.2s;cursor:default}
.chip:hover{border-color:var(--sky);color:#fff;transform:scale(1.06)}
.chip.hi{background:linear-gradient(120deg,rgba(47,123,255,.32),rgba(125,180,255,.18));border-color:rgba(77,159,255,.6);color:#fff;font-weight:600}
.legend{color:var(--muted);font-size:.82rem;margin-top:20px}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--grad);margin-right:6px;vertical-align:-1px}
.chip.dim{opacity:.25;filter:saturate(.3)}

/* hire-me role switcher */
.hireme{margin:-6px 0 30px;padding:22px;border:1px solid var(--border);border-radius:20px;background:rgba(47,123,255,.05)}
.hlabel{display:block;color:var(--sky);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.pbar{display:flex;gap:10px;flex-wrap:wrap}
.pbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:9px 22px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.25s;font-family:'Sora'}
.pbtn:hover{color:#fff;border-color:var(--sky);transform:translateY(-2px)}
.pbtn.active{background:var(--grad);color:#0a1220;border-color:transparent;box-shadow:0 6px 24px rgba(47,123,255,.4)}
.pline{margin-top:16px;color:var(--sky);font-size:.92rem;min-height:1.5em}

/* experience */
.timeline{position:relative;margin-left:10px}
.timeline::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--blue),var(--amber2))}
.job{position:relative;padding:0 0 34px 36px}
.job::before{content:"";position:absolute;left:-6px;top:8px;width:14px;height:14px;border-radius:50%;background:var(--bg);border:3px solid var(--amber);box-shadow:0 0 14px rgba(77,159,255,.6);transition:.3s}
.job:hover::before{transform:scale(1.4)}
.job .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;transition:.25s}
.job .card:hover{border-color:rgba(59,130,246,.5);transform:translateX(6px)}
.job h3{font-size:1.1rem}
.job .org{color:var(--amber);font-weight:600;font-size:.93rem;margin-top:2px}
.job .period{display:inline-block;margin-top:8px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:999px;padding:3px 12px;font-size:.76rem;color:var(--muted);font-family:'JetBrains Mono'}
.job ul{margin:12px 0 0 18px;color:var(--muted);font-size:.92rem}

/* certs */
.certgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.cert{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;display:flex;gap:14px;align-items:center;transition:.25s}
.cert:hover{transform:translateY(-5px) rotate(-.5deg);border-color:rgba(77,159,255,.5);box-shadow:0 14px 36px rgba(0,0,0,.45)}
.cert .badge{min-width:48px;height:48px;border-radius:14px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 18px rgba(47,123,255,.35)}
.cert b{font-size:.95rem}
.cert span{display:block;color:var(--muted);font-size:.79rem}

/* contact */
.contactcard{background:linear-gradient(120deg,rgba(47,123,255,.14),rgba(125,180,255,.07));border:1px solid rgba(47,123,255,.35);border-radius:26px;padding:56px 40px;text-align:center;position:relative;overflow:hidden}
.contactcard::before{content:"";position:absolute;width:340px;height:340px;border-radius:50%;background:rgba(47,123,255,.18);filter:blur(90px);top:-120px;right:-80px}
.contactcard h2{font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;letter-spacing:-1px;margin-bottom:12px}
.contactcard h2 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.contactcard p{color:var(--muted);max-width:540px;margin:0 auto 30px}
.clinks{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}

footer{color:var(--muted);font-size:.82rem;text-align:center;padding:48px 0;border-top:1px solid var(--border);margin-top:90px}

/* reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .8s ease}
.reveal.on{opacity:1;transform:none}

/* ===== PREMIUM LIGHT THEME ===== */
html[data-theme="light"]{
  --bg:#f6f7f9; --card:#ffffff; --border:rgba(13,18,32,.10);
  --text:#0d1220; --muted:#5b6474; --blue:#1e4fd8; --sky:#1e4fd8; --amber:#1e4fd8;
  --grad:linear-gradient(120deg,#0d1220,#1e4fd8 60%,#4f7df0);
}
html[data-theme="light"] body{background:var(--bg)}
html[data-theme="light"] nav{background:rgba(255,255,255,.78)}
html[data-theme="light"] .navlinks a.active{background:rgba(30,79,216,.10);color:#0d1220}
html[data-theme="light"] .btn.primary{color:#fff;box-shadow:0 8px 28px rgba(30,79,216,.28)}
html[data-theme="light"] .pbtn.active{color:#fff}
html[data-theme="light"] .chip{background:rgba(13,18,32,.04);color:#333d52}
html[data-theme="light"] .chip.hi{background:rgba(30,79,216,.10);border-color:rgba(30,79,216,.5);color:#0d1220}
html[data-theme="light"] .bento,
html[data-theme="light"] .skillcard,
html[data-theme="light"] .cert,
html[data-theme="light"] .job .card{box-shadow:0 8px 30px rgba(13,18,32,.06)}
html[data-theme="light"] .mtrack span{color:#3a4356}
html[data-theme="light"] .marquee{background:rgba(13,18,32,.02)}
html[data-theme="light"] .hireme{background:rgba(30,79,216,.04)}
html[data-theme="light"] .contactcard{background:linear-gradient(120deg,rgba(30,79,216,.08),rgba(79,125,240,.05));border-color:rgba(30,79,216,.25)}
html[data-theme="light"] #typed{color:#0d1220}
html[data-theme="light"] .job::before{background:var(--bg)}
html[data-theme="light"] .avail{background:rgba(30,79,216,.06);border-color:rgba(30,79,216,.3)}
html[data-theme="light"] .avail::before{background:#0ca678;box-shadow:0 0 10px #0ca678}
html[data-theme="light"] .cert .badge{box-shadow:0 4px 14px rgba(30,79,216,.25)}
html[data-theme="light"] .pring{box-shadow:0 0 60px rgba(30,79,216,.22),0 20px 50px rgba(13,18,32,.18)}
html[data-theme="light"] .pring::after{background:radial-gradient(circle at 35% 28%,transparent 55%,rgba(240,243,248,.4)),linear-gradient(160deg,rgba(30,79,216,.10),rgba(246,247,249,.15))}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="spot"></div>
<div id="prog"></div>

<nav>
  <div class="navin">
    <div class="logo">Balaji<span>.dev</span></div>
    <div class="navlinks" id="navlinks">
      <a href="#impact" data-i18n="n_impact"></a>

<div class="wrap">

</div>

<section id="skills" class="reveal">

  <div class="sechead"><h2 data-i18n="h_skills"></h2></div>
  <div class="hireme">

<section id="experience" class="reveal">

<section id="contact" class="reveal">
  <div class="contactcard">
    <h2><span data-i18n="c_head1"></span> <span class="grad" data-i18n="c_head2"></span></h2>
    <p data-i18n="c_text"></p>
    <div class="clinks">

/* typing */
let tIdx=0,tChar=0,tDel=false,tTimer;
function startTyping(){ clearTimeout(tTimer); tIdx=0;tChar=0;tDel=false; typeTick(); }
function typeTick(){
  const el=document.getElementById("typed"), word=ROLES[tIdx][lang];
  el.textContent=word.slice(0,tChar);
  if(!tDel){ tChar++; if(tChar>word.length){ tDel=true; tTimer=setTimeout(typeTick,1900); return; } }
  else { tChar--; if(tChar===0){ tDel=false; tIdx=(tIdx+1)%ROLES.length; } }
  tTimer=setTimeout(typeTick, tDel?30:60);
}

/* counters (run when visible) */
let counted=false;
function animateCounters(){
  if(counted) return; counted=true;
  document.querySelectorAll("[data-count]").forEach(el=>{
    const target=+el.getAttribute("data-count"); let cur=0;
    const step=()=>{ cur+=Math.max(1,Math.ceil(target/40));
      if(cur>=target){ el.textContent=target+"+"; } else { el.textContent=cur; requestAnimationFrame(step);} };
    step();
  });
}

/* reveal + counters + nav highlight */
const io=new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){ e.target.classList.add("on"); if(e.target.id==="impact") animateCounters(); }
}),{threshold:.12});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

const secObs=new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){
    document.querySelectorAll("#navlinks a").forEach(a=>a.classList.toggle("active",a.getAttribute("href")==="#"+e.target.id));
  }
}),{threshold:.4});
document.querySelectorAll("section[id]").forEach(s=>secObs.observe(s));

/* 3D tilt + inner glow on skill cards */
function bindTilt(){
  document.querySelectorAll(".tilt").forEach(card=>{
    card.onmousemove=e=>{
      const r=card.getBoundingClientRect(), x=e.clientX-r.left, y=e.clientY-r.top;
      card.style.setProperty("--mx",(x/r.width*100)+"%");
      card.style.setProperty("--my",(y/r.height*100)+"%");
      const rx=((y/r.height)-.5)*-7, ry=((x/r.width)-.5)*7;
      card.style.transform="rotateX("+rx+"deg) rotateY("+ry+"deg) translateZ(0)";
    };
    card.onmouseleave=()=>{ card.style.transform="rotateX(0) rotateY(0)"; };
  });
}

/* particle constellation */
const cv=document.getElementById("stars"), ctx=cv.getContext("2d");
let W,H,pts=[],mouse={x:-999,y:-999};
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight;
  const n=Math.min(90,Math.max(38,Math.floor(W*H/16000)));
  pts=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.6+.4}));
}
addEventListener("resize",resize); resize();
addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;},{passive:true});
/* touch = finger acts as the mouse for particles + spotlight */
addEventListener("touchmove",e=>{const t=e.touches[0];mouse.x=t.clientX;mouse.y=t.clientY;
  const light=document.documentElement.dataset.theme==="light";
  document.getElementById("spot").style.background=
    "radial-gradient(500px at "+t.clientX+"px "+t.clientY+"px, "+(light?"rgba(30,79,216,.06)":"rgba(59,130,246,.10)")+", transparent 70%)";
},{passive:true});
addEventListener("touchend",()=>{mouse.x=-999;mouse.y=-999;},{passive:true});
(function loop(){
  ctx.clearRect(0,0,W,H);
  const light=document.documentElement.dataset.theme==="light";
  const nearDot=light?"rgba(30,79,216,.85)":"rgba(255,255,255,.95)";
  const farDot=light?"rgba(30,79,216,.30)":"rgba(125,180,255,.5)";
  const lineRGB=light?"30,79,216":"77,159,255";
  const linkRGB=light?"30,79,216":"125,180,255";
  pts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
    const dm=Math.hypot(p.x-mouse.x,p.y-mouse.y);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7);
    ctx.fillStyle=dm<160?nearDot:farDot; ctx.fill();
    if(dm<160){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(mouse.x,mouse.y);
      ctx.strokeStyle="rgba("+lineRGB+","+(0.3*(1-dm/160))+")"; ctx.stroke(); }
  });
  for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
    const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<110){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle="rgba("+linkRGB+","+((light?0.10:0.14)*(1-d/110))+")"; ctx.stroke(); }
  }
  requestAnimationFrame(loop);
})();
